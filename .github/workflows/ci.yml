name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (check / test / build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version is intentionally omitted: pnpm/action-setup resolves it from
      # the "packageManager" field in the root package.json (pnpm@10.33.0).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check (svelte-check + tsc)
        run: pnpm check

      - name: Test
        run: pnpm --recursive --if-present test

      - name: Build
        run: pnpm build

  rust:
    name: Rust (check / test)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      # Scope: only the Tauri-independent crates are checked here.
      # `admin-template` (apps/admin-template/src-tauri) pulls in WebView2 on
      # Windows and webkit2gtk/libsoup/etc. on Linux, which requires heavy
      # system dependency installation. It is intentionally excluded from
      # this v1 CI to keep the pipeline fast and dependency-free; it can be
      # added back later with the appropriate `tauri-apps/tauri-action` /
      # apt setup once native builds are needed in CI.
      - name: Cargo check
        run: cargo check -p banto-core -p banto-storage -p banto-server -p admin-template-core

      - name: Cargo test
        run: cargo test -p banto-core -p banto-storage -p banto-server -p admin-template-core
