name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (check / test / build)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version is intentionally omitted: pnpm/action-setup resolves it from
      # the "packageManager" field in the root package.json (pnpm@10.33.0).
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (ESLint)
        run: pnpm lint

      # docs/conventions.md のうち機械検査可能な不変条件（サービス層の
      # transport 非依存・パッケージ間 import ゼロ・{@html}/生色値の
      # 許可リスト等）を強制する（improvement-plan P3-5）。
      - name: Verify architecture invariants
        run: pnpm verify:architecture

      - name: Format check (Prettier)
        run: pnpm format:check

      - name: Type check (svelte-check + tsc)
        run: pnpm check

      - name: Test
        run: pnpm --recursive --if-present test

      - name: Build
        run: pnpm build

  rust:
    name: Rust (fmt / clippy / check / test)
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      # rustfmt only parses/reformats - no compilation, so unlike the steps
      # below it can safely cover every workspace member (including
      # `admin-template`/src-tauri) without needing its native system deps.
      - name: Format check (rustfmt)
        run: cargo fmt --all -- --check

      # Scope: only the Tauri-independent crates are checked/linted/tested
      # here. `admin-template` (apps/admin-template/src-tauri) pulls in
      # WebView2 on Windows and webkit2gtk/libsoup/etc. on Linux, which
      # requires heavy system dependency installation. It is intentionally
      # excluded from this v1 CI to keep the pipeline fast and
      # dependency-free; it can be added back later with the appropriate
      # `tauri-apps/tauri-action` / apt setup once native builds are needed
      # in CI.
      - name: Cargo check
        run: cargo check -p banto-core -p banto-storage -p banto-server -p banto-attachments -p admin-template-core

      - name: Clippy
        run: cargo clippy -p banto-core -p banto-storage -p banto-server -p banto-attachments -p admin-template-core --all-targets -- -D warnings

      - name: Cargo test
        run: cargo test -p banto-core -p banto-storage -p banto-server -p banto-attachments -p admin-template-core

  e2e:
    name: E2E (Playwright smoke)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Produces apps/admin-template/build - the static SvelteKit output
      # `--features embed-ui` (below) embeds into the server binary
      # (apps/admin-template/core/src/assets.rs).
      - name: Build frontend
        run: pnpm build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      # e2e/playwright.config.ts's webServer launches this binary directly
      # (not `cargo run`) - it must already exist before `pnpm e2e` below.
      - name: Build banto-serve (embed-ui)
        run: cargo build -p admin-template-core --bin banto-serve --features embed-ui

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E smoke suite
        run: pnpm e2e

      # Baselines under e2e/visual/**/*-snapshots are committed pre-generated
      # on Linux, so this ubuntu-latest runner diffs against them directly -
      # no --update-snapshots step needed here. Uses the same `vite preview`
      # webServer entry (playwright.config.ts) against the `pnpm build`
      # output already produced above for the smoke suite.
      - name: Run visual regression + axe-core suite
        run: pnpm e2e:visual

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

      # Diff/actual/expected images for failed toHaveScreenshot() comparisons
      # land here (not in playwright-report/), so surface them separately -
      # short retention since this is only useful for the PR that produced it.
      - name: Upload Playwright test results (diffs)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: e2e/test-results/
          retention-days: 3

  audit:
    name: Dependency audit (pnpm audit / cargo audit)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # `--prod`: this is a template repo, and devDependencies (build
      # tooling, linters, Playwright, ...) are never shipped to end users
      # and turn over far more often than runtime deps. Gating CI on their
      # advisories would turn every template user's CI red on every new
      # devDependency-only advisory, with nothing actionable for them to
      # do about a package that never reaches production. Scoping to
      # `--prod` keeps this job meaningful: it only fails for advisories in
      # code that actually ships in the built frontend.
      - name: pnpm audit (prod dependencies only)
        run: pnpm audit --prod --audit-level high

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2

      # Matches this workflow's existing convention (see the `rust` job)
      # of using dtolnay for the toolchain itself; taiki-e/install-action
      # is used here specifically because it installs prebuilt `cargo-audit`
      # binaries instead of compiling from source, which would otherwise
      # add several minutes to this job.
      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo audit
        run: cargo audit
