# Visual regression baseline regeneration (manual).
#
# `e2e/visual/**/*-snapshots/*.png` are committed pre-generated ON LINUX and
# ci.yml diffs against them directly. Playwright appends the platform to each
# snapshot filename, so `--update-snapshots` on a macOS/Windows workstation
# writes `-darwin`/`-win32` files ALONGSIDE the `-linux` baselines instead of
# replacing them (see e2e/visual/README.md) - a contributor without a Linux
# box therefore cannot regenerate baselines at all, and any intentional visual
# change leaves ci.yml red with no local way out.
#
# This workflow is that way out: dispatch it on the branch carrying the visual
# change and it regenerates the `-linux` baselines on the same ubuntu-latest
# image ci.yml uses.
#
# `commit` defaults to false: the run only uploads the regenerated PNGs as an
# artifact so they can be eyeballed before anything is written to the branch.
# Dispatch again with `commit: true` once the diff looks intentional.
#
# Third-party actions are pinned to commit SHAs (see ci.yml's top-of-file
# policy comment); Dependabot (.github/dependabot.yml) keeps them current.
name: Visual baselines

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit the regenerated baselines back to the dispatched branch'
        type: boolean
        default: false

concurrency:
  group: visual-baselines-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    name: Regenerate -linux baselines
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # The `visual` project's webServer is `vite preview`, which serves
      # apps/admin-template/build (e2e/visual/README.md).
      - name: Build frontend
        run: pnpm build

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2

      # playwright.config.ts's `webServer` is an ARRAY and Playwright starts
      # every entry regardless of which --project is selected, so even a
      # visual-only run launches the banto-serve binary - it has to exist or
      # the run dies on the 30s webServer timeout.
      - name: Build banto-serve (embed-ui)
        run: cargo build -p admin-template-core --bin banto-serve --features embed-ui

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Regenerate baselines
        run: pnpm e2e:visual --update-snapshots

      # A regenerated baseline that does not then PASS a normal run would be a
      # broken baseline (non-deterministic rendering), so prove it here rather
      # than discovering it on the next PR.
      - name: Verify regenerated baselines pass
        run: pnpm e2e:visual

      - name: Summarize changed baselines
        run: |
          git add -A e2e/visual
          git status --short e2e/visual | tee "$GITHUB_STEP_SUMMARY"

      - name: Upload regenerated baselines
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: visual-baselines
          path: e2e/visual/**/*-snapshots/
          retention-days: 7

      - name: Commit baselines back to the branch
        if: inputs.commit
        run: |
          if git diff --cached --quiet -- e2e/visual; then
            echo "No baseline changes to commit."
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git commit -m 'test(visual): regenerate -linux baselines'
          git push origin HEAD:"${GITHUB_REF_NAME}"
