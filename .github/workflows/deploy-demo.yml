# ライブデモ（AD-2）: GitHub Pages プロジェクトサイト
# https://tyaro.github.io/banto/ に admin-template を InMemory プロバイダ
# （バックエンド不要）で公開する。svelte.config.js の `BASE_PATH` env で
# ベースパスを切り替える仕組み（Tauri/LAN は既定の base=''、この
# ワークフローだけ `/banto` を指定）を使う。
#
# サードパーティ Action は ci.yml のポリシーどおりコミット SHA 固定。
name: Deploy demo

on:
  push:
    branches: [main]
    paths:
      - 'apps/admin-template/**'
      - 'packages/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/deploy-demo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build demo (BASE_PATH=/banto)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # GitHub Pages のプロジェクトサイトは `/<repo>/` 配下に置かれるため、
      # svelte.config.js の `base` をここでだけ `/banto` にする（Tauri/LAN
      # ビルドは BASE_PATH 未設定 = base='' のまま、byte-identical）。
      - name: Build (project-site base path)
        run: pnpm --filter admin-template build
        env:
          BASE_PATH: /banto

      # SPA deep-link fallback: Pages は未知パスを 404.html に振るので、
      # index.html をコピーして同じ SPA を読み込ませる
      # (svelte.config.js の adapter fallback と同じ発想)。
      - name: SPA fallback (404.html)
        run: cp apps/admin-template/build/index.html apps/admin-template/build/404.html

      - name: Disable Jekyll processing
        run: touch apps/admin-template/build/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: apps/admin-template/build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
