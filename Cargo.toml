[workspace]
resolver = "2"
members = [
  "crates/banto-core",
  "crates/banto-storage",
  "crates/banto-server",
  "apps/admin-template/src-tauri",
]

[workspace.package]
version = "0.1.0"
edition = "2021"
license = "UNLICENSED"
repository = "https://github.com/tyaro/my-template"

[workspace.dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
